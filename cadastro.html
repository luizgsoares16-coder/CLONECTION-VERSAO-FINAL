<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <h2>É novo? Cadastre-se abaixo</h2>

    <p>
        Para ser cliente é necessário preencher corretamente o formulário abaixo
        com os respectivos dados cadastrais. Os campos * são de preenchimento
        obrigatório e essenciais para realizarmos o envio do seu futuro pedido.
    </p>
<hr>
    <div class="pessoa">
    
    <label>
        <input type="checkbox">Pessoa física 
    </label>
</div>
<form>
<div class="campo">

        <label>Nome: *</label> 
        <input type="text" required
placeholder="Digite seu nome."> 


        <label>Sobrenome: *</label> 
        <input type="text" required
placeholder="Digite seu sobronome."> 

<label>CPF: *</label> 
<input type="text" required
placeholder=" Ex: 000.000.000-00"
pattern="[0-9]{11}"> 

<label>Telefone: *</label> 
<input type="tel" required
placeholder="(DDD) Telefone."
pattern="[0-9]{11}"> 

<label>Email: *</label> 
<input type="email" required
placeholder="Ex: user@gmail.com"> 
 
<label>Senha: *</label> 
<input type="password" required
placeholder="Digite sua senha.">

<div class="rodape">
    <button type="submit">Cadastre-se</button>
    <a href="login.html">
        <button type="button">Voltar ao login</button>
        
        
        <a href="termos.html">Termos de Uso</a>
        <a href="politicas.html">Políticas de Privacidade</a>
        <a href="contrato.html">Contrato</a>

</footer>
</div>
</form>
</div>
</body>
</html>
